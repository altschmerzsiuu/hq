# Docker Compose Configuration

services:

  # ── MQTT Broker ─────────────────────────────────────────────────────────
  mqtt:
    image: eclipse-mosquitto
    container_name: mqtt-broker
    restart: unless-stopped
    ports:
      - "1883:1883"   # Plain MQTT — untuk collar lama & internal
      - "8883:8883"   # MQTTS (TLS) — untuk collar baru dengan enkripsi
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mqtt/fullchain.pem:/mosquitto/config/fullchain.pem:ro
      - ./mqtt/privkey.pem:/mosquitto/config/privkey.pem:ro
      - ./mqtt/passwd:/mosquitto/config/passwd:ro
    networks:
      - iot_network

  # ── Redis Cache ──────────────────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: redis-cache
    restart: unless-stopped
    command: redis-server --requirepass R3d!s@H3ctr4#26
    ports:
      - "127.0.0.1:6379:6379"  # Internal only
    networks:
      - iot_network

  # ── PostgreSQL Database ──────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg15
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgre
      POSTGRES_DB: Collar_to_Gateway
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init-historical.sql:/docker-entrypoint-initdb.d/02-init-historical.sql
    ports:
      - "127.0.0.1:5433:5432"  # Internal only — database tidak boleh terbuka ke internet
    networks:
      - iot_network

  # ── pgAdmin ──────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: hectra@admin.hectra.id
      PGADMIN_DEFAULT_PASSWORD: H3ctr@Adm1n#2026
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "127.0.0.1:5050:80"  # Internal only — akses via SSH tunnel: ssh -L 5050:localhost:5050 root@api.hectra.my.id
    depends_on:
      - db
    networks:
      - iot_network

  # ── Backend API ──────────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: backend-api
    restart: unless-stopped
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - MQTT_BROKER_URL=mqtt
      - MQTT_BROKER_PORT=1883
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=Collar_to_Gateway
      - DB_USER=postgres
      - DB_PASSWORD=postgre
      - REDIS_URL=redis://:R3d!s@H3ctr4#26@redis:6379/0
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_IDS=${TELEGRAM_CHAT_IDS}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PYTHONUNBUFFERED=1
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2}
      - DEVICE_API_KEY=${DEVICE_API_KEY}
    ports:
      - "127.0.0.1:5000:5000"  # Internal only — diakses via Nginx proxy
    depends_on:
      - mqtt
      - db
      - redis
    networks:
      - iot_network

  # ── MQTT Bridge ──────────────────────────────────────────────────────────
  mqtt-bridge:
    build: ./backend
    container_name: mqtt-bridge
    restart: unless-stopped
    command: python mqtt_bridge.py
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - MQTT_BROKER_URL=mqtt
      - MQTT_BROKER_PORT=1883
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=Collar_to_Gateway
      - DB_USER=postgres
      - DB_PASSWORD=postgre
      - REDIS_URL=redis://:R3d!s@H3ctr4#26@redis:6379/0
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_IDS=${TELEGRAM_CHAT_IDS}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PYTHONUNBUFFERED=1
    depends_on:
      - mqtt
      - db
      - redis
    networks:
      - iot_network

  # ── Scanner App (Node.js) ────────────────────────────────────────────────
  scanner-app:
    build: ./scanner-app
    container_name: scanner-app
    restart: unless-stopped
    env_file:
      - ./scanner-app/.env
    ports:
      - "127.0.0.1:3030:3030"  # Internal only — scanner app tidak perlu akses publik
    depends_on:
      - db
    networks:
      - iot_network

volumes:
  postgres-data:
  pgadmin-data:

networks:
  iot_network:
    driver: bridge
